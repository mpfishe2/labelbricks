<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LabelBricks — Annotator</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://cdn.jsdelivr.net/npm/fabric@4.6.0/dist/fabric.min.js"></script>
</head>
<body>
    <div class="app-layout">
        <!-- Header -->
        <header class="app-header">
            <div class="header-left">
                <img src="/static/images/logo-small.png" class="logo" alt="LabelBricks">
                <span class="app-title">LabelBricks</span>
            </div>
            <div class="header-right">
                <span class="user-info">{{ user_email }}</span>
                <button class="btn-icon" id="btn-change-volume" title="Change Volume">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
                    </svg>
                </button>
            </div>
        </header>

        <!-- Left Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <select id="status-filter">
                    <option value="all">All Images</option>
                    <option value="pending">Pending</option>
                    <option value="in-review">In Review</option>
                    <option value="reviewed">Reviewed</option>
                </select>
            </div>
            <div class="image-queue" id="image-queue">
                <!-- Populated by sidebar.js -->
            </div>
            <div class="sidebar-footer">
                <span class="progress-counter" id="progress-counter">0 / 0</span>
            </div>
        </aside>

        <!-- Center Canvas -->
        <main class="canvas-area" id="canvas-area">
            <div class="canvas-wrapper" id="canvas-wrapper">
                <canvas id="canvas"></canvas>
            </div>
        </main>

        <!-- Right Toolbar -->
        <aside class="toolbar" id="toolbar">
            <div class="tool-section">
                <h4>Tools</h4>
                <div class="tool-buttons" id="tool-buttons">
                    <button class="tool-btn active" data-tool="select" title="Select (1)">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3l7.07 16.97 2.51-7.39 7.39-2.51L3 3z"/><path d="M13 13l6 6"/></svg>
                        Select <span class="shortcut">1</span>
                    </button>
                    <button class="tool-btn" data-tool="rectangle" title="Rectangle (2)">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/></svg>
                        Rectangle <span class="shortcut">2</span>
                    </button>
                    <button class="tool-btn" data-tool="circle" title="Circle (3)">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><ellipse cx="12" cy="12" rx="9" ry="9"/></svg>
                        Circle <span class="shortcut">3</span>
                    </button>
                    <button class="tool-btn" data-tool="polygon" title="Polygon (4)">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12,2 22,8.5 19,20 5,20 2,8.5"/></svg>
                        Polygon <span class="shortcut">4</span>
                    </button>
                    <button class="tool-btn" data-tool="freehand" title="Freehand (5)">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 19l7-7 3 3-7 7-3-3z"/><path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/><path d="M2 2l7.586 7.586"/></svg>
                        Freehand <span class="shortcut">5</span>
                    </button>
                </div>
            </div>
            <div class="tool-section">
                <h4>Label Class</h4>
                <input type="text" id="label-input" placeholder="Enter label..." class="label-input">
                <div class="label-chips" id="label-chips">
                    <!-- Populated by label-manager.js -->
                </div>
            </div>
            <div class="tool-section">
                <h4>Annotations</h4>
                <div class="annotation-list" id="annotation-list">
                    <!-- Populated by annotation-store.js -->
                </div>
            </div>
        </aside>

        <!-- Bottom Bar -->
        <footer class="bottom-bar">
            <textarea id="notes" placeholder="Notes..." class="notes-input" rows="1"></textarea>
            <select id="status-select" class="status-select">
                <option value="pending">Pending</option>
                <option value="in-review">In Review</option>
                <option value="reviewed">Reviewed</option>
            </select>
            <div class="bottom-actions">
                <button id="btn-prev" class="btn-secondary">Prev</button>
                <button id="btn-save" class="btn-primary">Save</button>
                <button id="btn-next" class="btn-secondary">Next</button>
            </div>
        </footer>
    </div>

    <!-- Volume Browser Modal -->
    <div class="modal-overlay hidden" id="volume-browser-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Select Image Volume</h3>
                <button class="modal-close" id="modal-close">&times;</button>
            </div>
            <div class="modal-body volume-browser">
                <div class="browser-column" id="catalog-column">
                    <label>Catalog</label>
                    <input type="text" placeholder="Filter..." class="browser-filter" id="catalog-filter">
                    <ul class="browser-list" id="catalog-list"></ul>
                </div>
                <div class="browser-column" id="schema-column">
                    <label>Schema</label>
                    <input type="text" placeholder="Filter..." class="browser-filter" id="schema-filter">
                    <ul class="browser-list" id="schema-list"></ul>
                </div>
                <div class="browser-column" id="volume-column">
                    <label>Volume</label>
                    <input type="text" placeholder="Filter..." class="browser-filter" id="volume-filter">
                    <ul class="browser-list" id="volume-list"></ul>
                </div>
                <div class="browser-column" id="directory-column">
                    <label>Directory</label>
                    <input type="text" placeholder="Filter..." class="browser-filter" id="directory-filter">
                    <ul class="browser-list" id="directory-list"></ul>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-secondary" id="modal-cancel">Cancel</button>
                <button class="btn-primary" id="btn-open-volume" disabled>Open</button>
            </div>
        </div>
    </div>

    <!-- Toast Container -->
    <div class="toast-container" id="toast-container"></div>

    <!-- File data from server -->
    <script type="application/json" id="files-data">{{ files | tojson }}</script>

    <!-- App entry point -->
    <script type="module" src="/static/js/app.js"></script>
</body>
</html>
