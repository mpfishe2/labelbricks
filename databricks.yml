bundle:
  name: labelbricks

variables:
  catalog:
    description: "Unity Catalog name"
  schema:
    description: "Schema name"
    default: "default"
  volume:
    description: "Volume name for image storage"
  vision_model_endpoint:
    description: "FMAPI serving endpoint for AI suggestions"
    default: "databricks-claude-sonnet-4-5"
  app_sp_client_id:
    description: "Client ID of the app service principal (for Lakebase role setup)"
    default: ""

resources:
  apps:
    labelbricks:
      name: "labelbricks-${bundle.target}"
      description: "Image annotation tool with AI-assisted labeling"
      source_code_path: .
      resources:
        - name: "labelbricks-volume"
          uc_securable:
            securable_type: "VOLUME"
            securable_full_name: "${var.catalog}.${var.schema}.${var.volume}"
            permission: "WRITE_VOLUME"

  # NOTE: Lakebase Autoscaling resources (project, branch, endpoint) are
  # provisioned via the Databricks SDK — DABs does not yet support
  # postgres_projects/postgres_branches/postgres_endpoints resource types.
  # See scripts/bootstrap_lakebase.py for the one-time setup procedure.

targets:
  dev:
    default: true
    mode: development
    workspace:
      profile: e2-demo-field-eng
  fevm:
    mode: development
    workspace:
      profile: fevm-labelbricks-test
    variables:
      catalog: "labelbricks_test_catalog"
      schema: "default"
      volume: "images"
  prod:
    mode: production
    workspace:
      profile: e2-demo-field-eng
